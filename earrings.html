<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earrings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Choose Your Earrings 💎</h1>

    <div class="gift-options">

        <div class="gift-card">
            <img src="Images/Earrings/Earrings 1.jpg.webp" alt="Earring 1">
            <h3>Elegant Pearl Earrings</h3>
            <button onclick="selectGift('Elegant Pearl Earrings')">Choose This</button>
        </div>

        <div class="gift-card">
            <img src="Images/Earrings/Earrings 2.jpg.jpg" alt="Earring 2">
            <h3>Rose Gold Earrings</h3>
            <button onclick="selectGift('Rose Gold Earrings')">Choose This</button>
        </div>

        <div class="gift-card">
            <img src="Images/Earrings/Earrings 3.jpg.jpg" alt="Earring 3">
            <h3>Diamond Style Studs</h3>
            <button onclick="selectGift('Diamond Style Studs')">Choose This</button>
        </div>

    </div>

    <script>
        function selectGift(giftName) {
            alert("Your request for " + giftName + " has been received. You will be getting it by evening ❤️");
        }
    </script>

</body>
</html>
